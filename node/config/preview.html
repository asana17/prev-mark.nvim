<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    {{css}}
  </style>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}}</title>
  <script type="text/javascript" src="https://livejs.com/live.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/contrib/auto-render.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github.min.css">
  <script defer src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
  <script defer type="text/javascript">
    document.addEventListener("DOMContentLoaded", function () {
      mermaid.initialize({ startOnLoad: true });
      if (window.hljs) {
        // Only highlight blocks with an explicit language (```lang ...).
        // Bare ``` fences (e.g. ASCII figures drawn with | and -) are left as
        // plain monospace so they render exactly as written, like in the editor.
        document
          .querySelectorAll('pre code[class*="language-"]')
          .forEach(function (block) {
            hljs.highlightElement(block);
          });
      }
      setTimeout(function() {
        renderMathInElement(document.body, {
          delimiters: [
            {left: "$$", right: "$$", display: true},
            {left: "\\(", right: "\\)", display: false}
          ]
        });
      }, {{timeout}});
    });
  </script>
  </head>
<body>
  {{content}}
</body>
</html>
